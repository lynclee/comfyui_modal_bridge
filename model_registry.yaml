# comfyui_modal_bridge model registry
# 用于自动下载到 Modal Volume(/comfy-volume/models/<type>/<filename>)
#
# 字段:
#   type:            ComfyUI 模型目录(diffusion_models/vae/loras/...)
#   filename:        ComfyUI 看到的文件名(必须跟 workflow 里写的一致)
#   source:          huggingface | url | civitai
#   repo:            HF 仓库(source=huggingface)
#   hf_filename:     HF 上的文件名(可以跟 ComfyUI filename 不同)
#   hf_subfolder:    HF 仓库内子目录(可选)
#   url:             直链 URL(source=url)
#   civitai_id:      Civitai model id(source=civitai,V1 暂不支持)
#   requires_token:  true 表示需要 HF token(私有/受限 repo)
#
# 添加新模型:在末尾追加一条,无需改代码

# ═══════════════════════════════════════════════════════════
