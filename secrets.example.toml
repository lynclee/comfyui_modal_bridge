# comfyui_modal_bridge 配置(复制到 secrets.toml 后填写)
#
#   cp secrets.example.toml secrets.toml
#   vim secrets.toml
#
# ⚠️ secrets.toml **不要提交到 git**(已加到 .gitignore)

[modal]
# 去 https://modal.com/settings/tokens 创建 New Token,复制 ID + Secret
token_id     = "ak-xxxxxxxxxxxxxxxxxxxxxx"
token_secret = "as-xxxxxxxxxxxxxxxxxxxxxx"

# 你的 Modal workspace 名(modal.com 个人主页 URL 那一段)
# 例如 https://modal.com/lync5134 → workspace = "lync5134"
workspace = "your-workspace"


[huggingface]
# 可选。去 https://huggingface.co/settings/tokens 创建 Read token
# 不填 = 只能下公开模型(FLUX.2 / FLUX.1 需要 token,Z-Image 不需要)
token = ""


[civitai]
# 预留,V1 不实现下载。后续启用游戏风格 LoRA 时再填。
token = ""


[app]
# Modal app 名字(变了会创建一个新 app,可保持默认)
name             = "comfyui-bridge"

# 独立 Volume 名(全新部署用新名字;想复用已有 Volume 填它的名字)
volume_name      = "comfyui-bridge-models"

# 默认 GPU。允许:H100 / A100-80GB / A100 / L40S / A10G
default_gpu      = "H100"

# 容器空闲多久销毁(秒)。40 默认很激进,120 一般够用
scaledown_window = 120
